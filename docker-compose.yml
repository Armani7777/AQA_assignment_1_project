services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=django-secret-key-for-development-only
      - DEBUG=True
    volumes:
      - ./backend:/app
      - sqlite_data:/app/data
    command: >
      sh -c "python manage.py makemigrations users products orders reviews &&
             python manage.py migrate &&
             python manage.py seed &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  sqlite_data:
