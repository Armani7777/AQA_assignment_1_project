name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Django migrate + seed
        run: |
          python manage.py makemigrations users products orders reviews
          python manage.py migrate
          python manage.py seed
      - name: Django system checks
        run: python manage.py check

  frontend:
    name: Frontend (React/Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build

  api-tests:
    name: API E2E tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-html requests
      - name: Migrate and seed
        working-directory: backend
        run: |
          python manage.py migrate
          python manage.py seed
      - name: Start Django server
        working-directory: backend
        run: |
          nohup python manage.py runserver 0.0.0.0:8000 >/tmp/django.log 2>&1 &
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:8000/api/ >/dev/null; then
              echo "API is up"; break
            fi
            sleep 2
          done
      - name: Run pytest against live API
        run: |
          pytest shopmarket_tests.py -v
