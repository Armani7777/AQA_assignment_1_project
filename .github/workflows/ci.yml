name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
# =========================
# 🔧 BACKEND TESTS (Django)
# =========================
  backend-tests:
    name: Backend Tests (Django)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Run migrations (safe check)
        run: python manage.py migrate --check

      - name: Run tests
        run: pytest -q

# =========================
# 🎨 FRONTEND BUILD (Vite)
# =========================
  frontend-build:
    name: Frontend Build (React/Vite)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build

# =========================
# 🌐 API E2E TESTS
# =========================
  api-e2e:
    name: API E2E Tests (pytest + live server)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest requests

      - name: Run migrations + seed
        working-directory: backend
        run: |
          python manage.py migrate
          python manage.py seed

      - name: Start Django (gunicorn)
        working-directory: backend
        run: |
          pip install gunicorn
          gunicorn config.wsgi:application --bind 127.0.0.1:8000 &
          
          timeout 60 bash -c \
          'until curl -s http://127.0.0.1:8000/api/ > /dev/null; do sleep 2; done'

      - name: Run API tests
        working-directory: backend
        run: pytest shopmarket_tests.py -v

# =========================
# 🧬 MUTATION TESTS
# =========================
  mutation-tests:
    name: Mutation Testing
    runs-on: ubuntu-latest
    needs: api-e2e

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install mutmut

      - name: Run mutation tests
        run: python mutation_tests.py

# =========================
# ⚡ PERFORMANCE TESTS (k6)
# =========================
  performance-tests:
    name: Performance Tests (k6)
    runs-on: ubuntu-latest
    needs: api-e2e

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run performance tests
        run: k6 run performance_test.js
