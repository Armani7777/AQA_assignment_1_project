name: CI — ShopMarket (Assignment 3)

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  # ─────────────────────────────────────────
  # Job 1: Backend checks
  # ─────────────────────────────────────────
  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Django migrate + seed
        run: |
          python manage.py makemigrations users products orders reviews
          python manage.py migrate
          python manage.py seed
      - name: Django system checks
        run: python manage.py check

  # ─────────────────────────────────────────
  # Job 2: Frontend build
  # ─────────────────────────────────────────
  frontend:
    name: Frontend (React/Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build

  # ─────────────────────────────────────────
  # Job 3: Original API tests (Assignment 2)
  # ─────────────────────────────────────────
  api-tests:
    name: API Tests — Original Suite (A2)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-html requests
      - name: Migrate and seed
        working-directory: backend
        run: |
          python manage.py migrate
          python manage.py seed
      - name: Start Django server
        working-directory: backend
        run: |
          nohup python manage.py runserver 0.0.0.0:8000 > /tmp/django.log 2>&1 &
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:8000/api/products/ > /dev/null; then
              echo "API is up"; break
            fi
            sleep 2
          done
      - name: Run original tests (shopmarket_tests.py)
        run: pytest shopmarket_tests.py -v --html=report_a2.html --tb=short
      - name: Upload A2 test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-a2
          path: report_a2.html

  # ─────────────────────────────────────────
  # Job 4: Mutation tests 
  # ─────────────────────────────────────────
  mutation-tests:
    name: Mutation Tests — Assignment 3
    runs-on: ubuntu-latest
    needs: api-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-html requests
      - name: Migrate and seed
        working-directory: backend
        run: |
          python manage.py migrate
          python manage.py seed
      - name: Start Django server
        working-directory: backend
        run: |
          nohup python manage.py runserver 0.0.0.0:8000 > /tmp/django_mutation.log 2>&1 &
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:8000/api/products/ > /dev/null; then
              echo "API is up"; break
            fi
            sleep 2
          done
      - name: Run mutation baseline tests (must all pass)
        run: pytest mutation_tests.py -v --html=report_mutation_baseline.html --tb=short
      - name: Run mutation script
        run: |
          cp run_mutations.py backend/run_mutations.py
          cd backend
          python run_mutations.py | tee ../mutation_results.txt
      - name: Print mutation score
        run: cat mutation_results.txt
      - name: Upload mutation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-reports
          path: |
            report_mutation_baseline.html
            mutation_results.txt

  # ─────────────────────────────────────────
  # Job 5: Coverage report 
  # ─────────────────────────────────────────
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: mutation-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov requests
      - name: Migrate and seed
        working-directory: backend
        run: |
          python manage.py migrate
          python manage.py seed
      - name: Start Django server
        working-directory: backend
        run: |
          nohup python manage.py runserver 0.0.0.0:8000 > /tmp/django_cov.log 2>&1 &
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:8000/api/products/ > /dev/null; then
              echo "API is up"; break
            fi
            sleep 2
          done
      - name: Run tests with coverage
        run: |
          pytest mutation_tests.py shopmarket_tests.py \
            --cov=backend \
            --cov-report=term \
            --cov-report=html:coverage_html \
            -v
        continue-on-error: true
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_html/
