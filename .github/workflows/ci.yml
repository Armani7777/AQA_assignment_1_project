name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Позволяет запускать тесты вручную кнопкой

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
# =========================
# 🔧 BACKEND & FRONTEND (Параллельно)
# =========================
  backend-tests:
    name: Backend Tests (Django)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest
      - name: Django check
        run: python manage.py check
      - name: Run fast tests
        run: pytest -m "not e2e" --suppress-no-test-exit-code # Пропускаем тяжелые тесты

  frontend-build:
    name: Frontend Build (React/Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

# =========================
# 🌐 API E2E TESTS (С отдельной БД)
# =========================
  api-e2e:
    name: API E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports: [5432:5432]
        options: --health-cmd="pg_isready -U postgres" --health-interval=10s --health-timeout=5s --health-retries=5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: |
          pip install -r backend/requirements.txt
          pip install pytest requests gunicorn
      - name: Run API tests
        continue-on-error: true # Чтобы мутации и перформанс запустились даже при 500 ошибке
        run: |
          cd backend
          python manage.py migrate
          python manage.py seed
          gunicorn config.wsgi:application --bind 127.0.0.1:8000 &
          sleep 5
          pytest shopmarket_tests.py -v

# =========================
# 🧬 ОТДЕЛЬНЫЕ ЗАДАЧИ (Запускаются одновременно после api-e2e)
# =========================
  mutation-tests:
    name: Mutation Testing
    runs-on: ubuntu-latest
    needs: api-e2e
    if: always() # Запустится, даже если api-e2e "упал"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install mutmut
      - name: Run mutation tests
        continue-on-error: true
        run: python mutation_tests.py

  performance-tests:
    name: Performance Tests (k6)
    runs-on: ubuntu-latest
    needs: api-e2e
    if: always() # Запустится в любом случае
    steps:
      - uses: actions/checkout@v4
      - name: Setup k6
        uses: grafana/setup-k6-action@v1
      - name: Run performance tests
        continue-on-error: true
        run: k6 run performance_test.js
